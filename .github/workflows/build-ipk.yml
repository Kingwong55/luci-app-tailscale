name: Build IPK

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64_generic]
        include:
          - arch: x86_64
            sdk_url: https://downloads.immortalwrt.org/releases/24.10.1/targets/x86/64/immortalwrt-sdk-24.10.1-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - arch: aarch64_generic
            sdk_url: https://downloads.immortalwrt.org/releases/24.10.1/targets/armsr/armv8/immortalwrt-sdk-24.10.1-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget zstd

      - name: Download SDK
        run: |
          wget -q "${{ matrix.sdk_url }}" -O sdk.tar.zst
          mkdir sdk
          tar --zstd -xf sdk.tar.zst --strip-components=1 -C sdk

      - name: Setup feeds
        run: |
          cd sdk
          echo "src-link tailscale ${{ github.workspace }}" > feeds.conf
          cat feeds.conf.default >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-tailscale

      - name: Build
        run: |
          cd sdk
          make defconfig
          make package/luci-app-tailscale/compile V=s -j$(nproc) || make package/luci-app-tailscale/compile V=s -j1

      - name: Collect IPK
        run: |
          mkdir -p output
          find sdk/bin/ -name "luci-app-tailscale*.ipk" -exec cp {} output/ \;
          ls -la output/

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.ipk

      - name: Upload Artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-tailscale-${{ matrix.arch }}
          path: output/*.ipk
