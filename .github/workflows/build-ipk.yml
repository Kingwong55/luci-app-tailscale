name: Build IPK

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: luci-app-tailscale

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget zstd

      - name: Download SDK
        run: |
          wget -q "https://downloads.immortalwrt.org/releases/24.10.1/targets/x86/64/immortalwrt-sdk-24.10.1-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst" -O sdk.tar.zst
          mkdir sdk
          tar --zstd -xf sdk.tar.zst --strip-components=1 -C sdk

      - name: Prepare feed
        run: |
          mkdir -p feed/luci-app-tailscale
          cp -r luci-app-tailscale/* feed/luci-app-tailscale/

      - name: Setup feeds
        run: |
          cd sdk
          echo "src-link customfeed ${{ github.workspace }}/feed" > feeds.conf
          cat feeds.conf.default >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-tailscale

      - name: Build
        run: |
          cd sdk
          make defconfig
          make package/luci-app-tailscale/compile V=s -j$(nproc) || make package/luci-app-tailscale/compile V=s -j1

      - name: Collect packages
        run: |
          mkdir -p output
          find sdk/bin/ -name "luci-*tailscale*.ipk" -exec cp {} output/ \;
          find sdk/bin/ -name "luci-*tailscale*.apk" -exec cp {} output/ \;
          ls -la output/

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: output/*

      - name: Upload Artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-tailscale-packages
          path: output/*
